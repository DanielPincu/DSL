name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/rtty/danish-life-simulator
            git pull
            cd apps/api && npx tsc && cd ..
            cd apps/web && npx vite build && cd ..
            echo '${{ secrets.VPS_SUDO_PASS }}' | sudo -S cp -r apps/web/dist/* /var/www/html/
            echo '${{ secrets.VPS_SUDO_PASS }}' | sudo -S chown -R www-data:www-data /var/www/html/
            pm2 restart dls-api
